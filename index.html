<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏控制中心</title>
    <style>
        /* 动态发光主题变量 */
        :root {
            --theme-primary: #00ff66;
            --theme-hover: #00cc52;
            --theme-glow: rgba(0, 255, 102, 0.25);
            --dark-border: #141730; /* 更加深邃的机械深色边框 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
        }

        body {
            background-color: #080914; /* 深邃底色，强化质感 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            /* 页面加入隐约的电子网格纹理，丰富背景层级 */
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.01) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.01) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* --- 左上角调色控制中心 --- */
        .theme-selector {
            position: absolute;
            top: 25px;
            left: 25px;
            background: #111326;
            border: 2px solid var(--dark-border);
            padding: 10px 18px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .theme-selector span {
            font-size: 0.75rem;
            color: #5c62f7;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .color-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
        }
        .color-dot:hover { transform: scale(1.25); }
        .color-dot.active { border-color: #ffffff; transform: scale(1.15); }
        .dot-green { background-color: #00ff66; box-shadow: 0 0 8px rgba(0,255,102,0.4); }
        .dot-blue  { background-color: #00f3ff; box-shadow: 0 0 8px rgba(0,243,255,0.4); }
        .dot-red   { background-color: #ff3366; box-shadow: 0 0 8px rgba(255,51,102,0.4); }
        .dot-yellow { background-color: #ffcc00; box-shadow: 0 0 8px rgba(255,204,0,0.4); }

        /* --- 密码验证界面 --- */
        #auth-panel {
            background: #121429;
            border: 2px solid var(--dark-border);
            border-radius: 8px;
            padding: 45px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), inset 0 0 15px rgba(255,255,255,0.02);
            position: relative;
        }

        /* 边缘机械角分线小装饰 */
        #auth-panel::before {
            content: ''; position: absolute; top: -2px; left: -2px; width: 15px; height: 15px;
            border-top: 3px solid var(--theme-primary); border-left: 3px solid var(--theme-primary);
            transition: border-color 0.3s;
        }

        .auth-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--theme-primary);
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: color 0.3s;
        }

        .crypto-input {
            width: 100%;
            background-color: #090a14;
            border: 2px solid var(--dark-border);
            padding: 15px;
            color: #ffffff;
            font-size: 1.3rem;
            text-align: center;
            outline: none;
            border-radius: 6px;
            margin-bottom: 25px;
            transition: border-color 0.3s;
        }
        .crypto-input:focus {
            border-color: var(--theme-primary);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--theme-primary);
            color: #080914;
            border: none;
            padding: 15px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            border-radius: 6px;
            box-shadow: 0 4px 15px var(--theme-glow);
            transition: all 0.3s;
        }
        .submit-btn:hover {
            background-color: var(--theme-hover);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px var(--theme-glow);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }

        /* --- 游戏主展示主页 --- */
        #game-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 45px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255,255,255,0.1);
        }

        /* 双层厚重工业级机壳包装盒 */
        .game-mainframe-box {
            position: relative;
            background: #111326;
            border: 2px solid var(--dark-border);
            border-radius: 12px;
            padding: 6px; 
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7);
            transition: border-color 0.3s, box-shadow 0.3s;
        }
        .game-mainframe-box:hover {
            border-color: var(--theme-primary);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 25px var(--theme-glow);
        }

        /* 内部展示核心卡片 */
        .game-card {
            background: linear-gradient(145deg, #181135 0%, #0e1020 100%);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            width: 290px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 35px 25px 25px 25px;
            position: relative;
            overflow: hidden;
        }

        .game-icon {
            width: 65px;
            height: 65px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        .game-icon svg {
            width: 55%;
            height: 55%;
            fill: var(--theme-primary);
            filter: drop-shadow(0 0 8px var(--theme-glow));
            transition: fill 0.3s, filter 0.3s;
        }

        .game-name {
            font-size: 1.15rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 25px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* 核心执行玩耍按钮 */
        .launch-btn {
            width: 100%;
            background-color: var(--theme-primary);
            color: #080914;
            border: none;
            padding: 14px 0;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px var(--theme-glow);
            transition: all 0.2s ease;
        }
        .launch-btn:hover {
            background-color: var(--theme-hover);
            box-shadow: 0 6px 18px var(--theme-glow);
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <!-- 左上角颜色控制器 -->
    <div class="theme-selector">
        <span>THEME</span>
        <div class="color-dot dot-green active" onclick="switchTheme('#00ff66', '#00cc52', 'rgba(0,255,102,0.25)', this)"></div>
        <div class="color-dot dot-blue" onclick="switchTheme('#00f3ff', '#00b0cc', 'rgba(0,243,255,0.25)', this)"></div>
        <div class="color-dot dot-red" onclick="switchTheme('#ff3366', '#cc2452', 'rgba(255,51,102,0.25)', this)"></div>
        <div class="color-dot dot-yellow" onclick="switchTheme('#ffcc00', '#cca300', 'rgba(255,204,0,0.25)', this)"></div>
    </div>

    <!-- 1. 密码输入卡片 -->
    <div id="auth-panel">
        <div class="auth-title">SECURITY ACCESS</div>
        <input type="password" id="password-field" class="crypto-input" placeholder="PASSWORD" autocomplete="off" autofocus>
        <button type="button" id="submit-btn" class="submit-btn">AUTHENTICATE</button>
        <div class="error-msg" id="error-prompt">ACCESS DENIED</div>
    </div>

    <div id="game-panel">
        <h1 class="page-title">游戏中心</h1>

                    </svg>
                </div>
                <div class="game-name">modern client</div>

        </div>
