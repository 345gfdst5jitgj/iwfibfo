<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-VAULT // 游戏中央矩阵</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #da00ff;
            --bg-dark: #0a0a12;
            --panel-bg: rgba(16, 16, 28, 0.75);
            --text-main: #e0e0ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 矩阵粒子背景 */
        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* 扫描线特效 */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        /* 统一容器样式 */
        .container {
            position: relative;
            z-index: 3;
            background: var(--panel-bg);
            border: 1px solid rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1), inset 0 0 15px rgba(0, 243, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 40px;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* --- 1. 密码解锁界面 --- */
        #auth-panel {
            width: 400px;
            text-align: center;
        }

        .hud-title {
            font-size: 1.5rem;
            letter-spacing: 4px;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .hud-subtitle {
            font-size: 0.75rem;
            color: rgba(224, 224, 255, 0.5);
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .crypto-input-wrapper {
            position: relative;
            margin-bottom: 25px;
        }

        .crypto-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(218, 0, 255, 0.3);
            padding: 15px;
            color: #fff;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-align: center;
            border-radius: 6px;
            outline: none;
            transition: all 0.3s;
        }

        .crypto-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
        }

        .neon-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 14px;
            font-size: 1rem;
            letter-spacing: 2px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }

        .neon-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .error-msg {
            color: #ff3366;
            font-size: 0.85rem;
            margin-top: 15px;
            height: 20px;
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* --- 2. 游戏展示主页 --- */
        #game-panel {
            width: 90vw;
            max-width: 1200px;
            height: 85vh;
            display: none; /* 初始隐藏 */
            flex-direction: column;
            opacity: 0;
            transform: scale(0.95);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .matrix-status {
            font-size: 0.8rem;
            color: #00ff66;
            text-shadow: 0 0 5px rgba(0, 255, 102, 0.4);
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            overflow-y: auto;
            flex-grow: 1;
            padding-right: 10px;
        }

        /* 隐藏滚动条但保留滚动功能 */
        .game-grid::-webkit-scrollbar {
            width: 4px;
        }
        .game-grid::-webkit-scrollbar-thumb {
            background: var(--neon-cyan);
            border-radius: 2px;
        }

        /* 游戏卡片样式 */
        .game-card {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(224, 224, 255, 0.1);
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            overflow: hidden;
        }

        .game-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--neon-purple);
            transition: all 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-cyan);
            box-shadow: 0 5px 20px rgba(0, 243, 255, 0.15);
        }

        .game-card:hover::before {
            background: var(--neon-cyan);
            height: 100%;
            box-shadow: 0 0 10px var(--neon-cyan);
        }

        .game-title {
            font-size: 1.25rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .game-tag {
            align-self: flex-start;
            font-size: 0.7rem;
            background: rgba(218, 0, 255, 0.15);
            color: var(--neon-purple);
            border: 1px solid rgba(218, 0, 255, 0.3);
            padding: 2px 8px;
            border-radius: 4px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .game-desc {
            font-size: 0.85rem;
            color: rgba(224, 224, 255, 0.6);
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .launch-btn {
            background: rgba(0, 243, 255, 0.05);
            border: 1px solid rgba(0, 243, 255, 0.4);
            color: var(--neon-cyan);
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .launch-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }
    </style>
</head>
<body>

    <!-- 背景粒子画布 -->
    <canvas id="bg-canvas"></canvas>

    <!-- 1. 验证面板 -->
    <div class="container" id="auth-panel">
        <div class="hud-title">ACCESS DENIED</div>
        <div class="hud-subtitle">请输入密钥以解锁矩阵数据库</div>
        
        <div class="crypto-input-wrapper">
            <input type="password" id="password-field" class="crypto-input" placeholder="•••••" maxlength="10">
        </div>
        
        <button class="neon-btn" onclick="verifyKey()">INITIALIZE DECRYPTION</button>
        <div class="error-msg" id="error-prompt">CRITICAL ERROR: INVALID KEY</div>
    </div>

    <!-- 2. 游戏中央控制台主页 -->
    <div class="container" id="game-panel">
        <div class="panel-header">
            <div>
                <div class="hud-title" style="font-size: 1.8rem; margin: 0;">CORE MATRIX</div>
                <div class="hud-subtitle" style="margin: 0;">已连接安全终端系统</div>
            </div>
            <div class="matrix-status">● SYSTEM: ONLINE [NODE_01]</div>
        </div>

        <!-- 游戏卡片网格 -->
        <div class="game-grid">
            <!-- 第一个核心游戏：ModernClient -->
            <div class="game-card">
                <div>
                    <div class="game-title">ModernClient</div>
                    <div class="game-tag">Eaglercraft 1.12 WASM-GC</div>
                    <div class="game-desc">基于高级网元技术的 Web 端极致优化版 Minecraft 1.12 核心，提供超凡的数据解算与流畅的原生沙盒体验。</div>
                </div>
                <a href="https://345gfdst5jitgj.github.io/modernclient/wasm/" target="_blank" class="launch-btn" onclick="playClickSound()">启动游戏引擎</a>
            </div>

            <!-- 留空槽位 1 -->
            <div class="game-card" style="opacity: 0.5; border-style: dashed;">
                <div>
                    <div class="game-title">数据空槽 // SLOT 02</div>
                    <div class="game-tag">等待接入</div>
                    <div class="game-desc">该存储扇区当前处于静默状态，准备后续云端核心游戏节点数据的导入。</div>
                </div>
                <a href="#" class="launch-btn" style="pointer-events: none; border-color: rgba(224,224,255,0.2); color: rgba(224,224,255,0.4);">未连接</a>
            </div>

            <!-- 留空槽位 2 -->
            <div class="game-card" style="opacity: 0.5; border-style: dashed;">
                <div>
                    <div class="game-title">数据空槽 // SLOT 03</div>
