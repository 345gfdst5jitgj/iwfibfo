<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        /* 动态主题 CSS 变量（默认绿色） */
        :root {
            --theme-primary: #00ff66;
            --theme-hover: #00cc52;
            --theme-bg-glow: rgba(0, 255, 102, 0.15);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f1123; /* 经典深蓝黑底色 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* --- 左上角色彩控制中心 --- */
        .theme-selector {
            position: absolute;
            top: 25px;
            left: 25px;
            background-color: #171932;
            border: 1px solid #2a2d5a;
            padding: 10px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .theme-selector span {
            font-size: 0.8rem;
            color: #8c92ff;
            font-weight: 500;
        }

        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s, border-color 0.2s;
        }

        .color-dot:hover {
            transform: scale(1.2);
        }

        .color-dot.active {
            border-color: #ffffff;
            transform: scale(1.1);
        }

        /* 预设的四个颜色 */
        .dot-green { background-color: #00ff66; }
        .dot-blue  { background-color: #00f3ff; }
        .dot-red   { background-color: #ff3366; }
        .dot-yellow { background-color: #ffcc00; }


        /* --- 密码验证界面 --- */
        #auth-panel {
            background-color: #171932;
            border: 1px solid #2a2d5a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: border-color 0.3s;
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--theme-primary);
            margin-bottom: 25px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .crypto-input {
            width: 100%;
            background-color: #0f1123;
            border: 1px solid #3d4279;
            padding: 14px;
            color: #ffffff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            border-radius: 8px;
            margin-bottom: 20px;
            transition: border-color 0.3s;
        }

        .crypto-input:focus {
            border-color: var(--theme-primary);
        }

        .submit-btn {
            width: 100%;
            background-color: var(--theme-primary);
            color: #0f1123; /* 深色文字，高亮对比 */
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            transition: background-color 0.3s, color 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--theme-hover);
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
        }


        /* --- 游戏展示主页 --- */
        #game-panel {
            display: none; /* 验证成功前隐藏 */
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-shadow: 0 0 15px var(--theme-bg-glow);
        }

        /* 游戏卡片布局（带动态主题发光边框） */
        .game-card {
            background: linear-gradient(135deg, #1d153b 0%, #171932 100%);
            border: 1px solid #2a2d5a;
            border-radius: 12px;
            width: 280px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px 20px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .game-card:hover {
            border-color: var(--theme-primary);
            box-shadow: 0 8px 30px var(--theme-bg-glow);
        }

        /* 卡片内图标 */
        .game-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-icon svg {
            width: 100%;
            height: 100%;
            fill: var(--theme-primary);
            transition: fill 0.3s;
        }

        .game-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 超链接跳转按钮 */
        .launch-btn {
            display: block;
            width: 100%;
            background-color: var(--theme-primary);
            color: #0f1123;
            text-align: center;
            text-decoration: none;
            padding: 12px 0;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 6px;
            transition: background-color 0.3s, color 0.3s;
        }

        .launch-btn:hover {
            background-color: var(--theme-hover);
        }
    </style>
</head>
<body>

    <!-- 左上角色彩控制中心 -->
    <div class="theme-selector">
        <span>更换主题:</span>
        <div class="color-dot dot-green active" onclick="switchTheme('#00ff66', '#00cc52', 'rgba(0,255,102,0.2)', this)"></div>
        <div class="color-dot dot-blue" onclick="switchTheme('#00f3ff', '#00b0cc', 'rgba(0,243,255,0.2)', this)"></div>
        <div class="color-dot dot-red" onclick="switchTheme('#ff3366', '#cc2452', 'rgba(255,51,102,0.2)', this)"></div>
        <div class="color-dot dot-yellow" onclick="switchTheme('#ffcc00', '#cca300', 'rgba(255,204,0,0.2)', this)"></div>
    </div>

    <!-- 1. 密码输入界面 -->
    <div id="auth-panel">
        <div class="auth-title">安全锁验证</div>
        <input type="password" id="password-field" class="crypto-input" placeholder="请输入密码" autocomplete="off" autofocus>
        <button type="button" id="submit-btn" class="submit-btn">验证并进入</button>
        <div class="error-msg" id="error-prompt">密码错误，拒绝访问</div>
    </div>

    <!-- 2. 游戏中心主页 -->
    <div id="game-panel">
        <h1 class="page-title">游戏中心</h1>
        
        <div class="game-card">
            <div class="game-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M18.85 4.54l1.41 1.41c.39.39.39 1.02 0 1.41l-1.83 1.83-2.83-2.83 1.83-1.83c.39-.39 1.03-.39 1.42 0M2 22l6.41-6.41c-.08-.34-.04-.71.12-1.05.27-.55.85-.9 1.47-.9h.01l4.01-4.01c-.13-.3-.15-.65-.04-.97.23-.62.83-1.03 1.5-1.02l-4.47-4.47C10.23 2.38 9.1 2 7.94 2c-1.83 0-3.56.71-4.85 2C1.12 6 0 8.71 0 11.58c0 2.22.68 4.3 1.95 6.04L2 22.01M16 11l.03-.03c.67.01 1.27-.4 1.5-1.02.11-.32.09-.67-.04-.97l4.01-4.01c.62.02 1.2-.33 1.47-.88.24-.5.21-1.09-.08-1.57l-3.05 3.05-2.83-2.83 3.05-3.05c-.48-.29-1.07-.32-1.57-.08-.55.27-.9.85-.88 1.47l-4.01 4.01c-.3-.13-.65-.15-.97-.04-.62.23-1.03.83-1.02 1.5L16 11z"/>
                </svg>
            </div>
            <div class="game-name">modern client</div>
            <!-- 精准无错的长链接路径 -->
            <a href="https://github.io" target="_blank" class="launch-btn">立即玩玩</a>
        </div>
    </div>

    <script>
        // --- 核心密码验证逻辑 ---
        const passwordInput = document.getElementById('password-field');
        const submitButton = document.getElementById('submit-btn');
        const errorPrompt = document.getElementById('error-prompt');
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');

        function checkPassword() {
            if (passwordInput.value.trim() === "76887") {
                errorPrompt.style.display = "none";
                authPanel.style.display = "none";
                gamePanel.style.display = "flex";
            } else {
                errorPrompt.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        submitButton.addEventListener('click', function(e) {
            e.preventDefault();
            checkPassword();
        });

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkPassword();
            }
        });

        // --- 主题颜色实时切换引擎 ---
        function switchTheme(primaryColor, hoverColor, glowColor, element) {
            // 切换左上角小圆点的 active 样式
            document.querySelectorAll('.color-dot').forEach(dot => dot.classList.remove('active'));
            element.classList.add('active');

            // 动态修改全局 CSS 主题变量
            document.documentElement.style.setProperty('--theme-primary', primaryColor);
            document.documentElement.style.setProperty('--theme-hover', hoverColor);
            document.documentElement.style.setProperty('--theme-bg-glow', glowColor);
        }
    </script>
</body>
</html>
