<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-VAULT // 代码雨安全矩阵</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --neon-cyan: #00f3ff;
            --bg-dark: #05050a;
            --panel-bg: rgba(5, 15, 10, 0.85);
            --text-main: #d0ffd0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 全屏代码雨画布 */
        #canvas-matrix {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 屏幕扫描线特效 */
        .crt-scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
            background-size: 100% 4px;
            z-index: 2;
            pointer-events: none;
        }

        /* 核心外框 */
        .container {
            position: relative;
            z-index: 3;
            background: var(--panel-bg);
            border: 2px solid var(--neon-green);
            box-shadow: 0 0 25px rgba(0, 255, 102, 0.2), inset 0 0 20px rgba(0, 255, 102, 0.1);
            backdrop-filter: blur(5px);
            border-radius: 4px;
            padding: 40px;
            transition: all 0.4s ease;
        }

        /* --- 密码验证面板 --- */
        #auth-panel {
            width: 420px;
            text-align: center;
        }

        .hud-title {
            font-size: 1.6rem;
            font-weight: bold;
            letter-spacing: 3px;
            color: var(--neon-green);
            text-shadow: 0 0 10px rgba(0, 255, 102, 0.6);
            margin-bottom: 8px;
        }

        .hud-subtitle {
            font-size: 0.8rem;
            color: rgba(208, 255, 208, 0.6);
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        .crypto-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--neon-green);
            padding: 15px;
            color: #fff;
            font-size: 1.4rem;
            letter-spacing: 8px;
            text-align: center;
            outline: none;
            margin-bottom: 20px;
        }

        .crypto-input:focus {
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.5);
        }

        .neon-btn {
            width: 100%;
            background: rgba(0, 255, 102, 0.1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .neon-btn:hover {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .error-msg {
            color: #ff3333;
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: bold;
            visibility: hidden; /* 默认隐藏占位 */
        }

        /* --- 游戏展示主页 --- */
        #game-panel {
            width: 90vw;
            max-width: 1100px;
            height: 80vh;
            display: none; /* 初始隐藏 */
            flex-direction: column;
            opacity: 0;
            border-color: var(--neon-cyan);
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.2);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--neon-cyan);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
            overflow-y: auto;
            flex-grow: 1;
        }

        /* 游戏卡片 */
        .game-card {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 243, 255, 0.3);
            padding: 25px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .game-card:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
            transform: translateY(-2px);
        }

        .game-title {
            font-size: 1.3rem;
            color: #fff;
            margin-bottom: 5px;
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        .game-tag {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            padding: 2px 6px;
            margin-bottom: 15px;
        }

        .game-desc {
            font-size: 0.9rem;
            color: rgba(200, 240, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .launch-btn {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            padding: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .launch-btn:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
    </style>
</head>
<body>

    <!-- 全屏遮罩与代码雨 -->
    <canvas id="canvas-matrix"></canvas>
    <div class="crt-scanlines"></div>

    <!-- 1. 验证面板 -->
    <div class="container" id="auth-panel">
        <div class="hud-title">&gt; SECURITY_CHECK</div>
        <div class="hud-subtitle">请输入核心解锁密钥 (76887)</div>
        
        <input type="password" id="password-field" class="crypto-input" placeholder="*****" autofocus>
        <button class="neon-btn" onclick="verifyKey()">执行解密程序</button>
        
        <div class="error-msg" id="error-prompt">!! 密钥错误：拒绝访问 !!</div>
    </div>

    <!-- 2. 游戏矩阵控制台 -->
    <div class="container" id="game-panel">
        <div class="panel-header">
            <div>
                <div class="hud-title" style="color: var(--neon-cyan); text-shadow: 0 0 10px rgba(0,243,255,0.6); margin: 0;">TERMINAL // MAIN_FRAME</div>
                <div class="hud-subtitle" style="margin: 0;">数据流解密完成。节点已就绪。</div>
            </div>
            <div style="color: var(--neon-cyan); font-size: 0.85rem;">STATUS: AUTHENTICATED</div>
        </div>

        <div class="game-grid">
            <!-- 游戏 1: ModernClient -->
            <div class="game-card">
                <div>
                    <div class="game-title">modernclient</div>
                    <div class="game-tag">WASM ENGINE</div>
                    <div class="game-desc">基于高级网元技术架构的网页端优化沙盒。解算核心数据，提供原生般流畅的 3D 矩阵模拟。</div>
                </div>
                <a href="https://github.io" target="_blank" class="launch-btn">进入运行矩阵</a>
            </div>

            <!-- 空槽位 -->
            <div class="game-card" style="opacity: 0.3; border-style: dashed;">
                <div>
                    <div class="game-title">[ 空置扇区 ]</div>
                    <div class="game-tag">VOID</div>
                    <div class="game-desc">等待下一次外部加密协议链路接入，暂无可用游戏映像。</div>
                </div>
                <a href="#" class="launch-btn" style="pointer-events: none;">未连接</a>
            </div>
        </div>
    </div>

    <script>
        // ================= 代码雨特效引擎 =================
        const canvas = document.getElementById('canvas-matrix');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // 字符集（日文半角、数字、英文字符）
        const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ";
        const fontSize = 16;
        let columns = Math.floor(canvas.width / fontSize);
        let rainDrops = Array(columns).fill(1);

        // 颜色主题变量
        let streamColor = 'rgba(0, 255, 102, '; // 初始为绿色代码雨

        function drawMatrix() {
            // 制造拖尾黑影
            ctx.fillStyle = 'rgba(5, 5, 10, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + 'px monospace';

            for(let i = 0; i < rainDrops.length; i++) {
                const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                
                // 头部字符高亮发光
                if (Math.random() > 0.98) {
                    ctx.fillStyle = '#ffffff';
                } else {
                    ctx.fillStyle = streamColor + (Math.random() * 0.5 + 0.5) + ')';
                }

                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                if(rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    rainDrops[i] = 0;
                }
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 30);

        // ================= 核心密码验证逻辑 =================
        function verifyKey() {
            const inputField = document.getElementById('password-field');
            const errorPrompt = document.getElementById('error-prompt');
