<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏中心</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0f1123; /* 截图同款深蓝黑底色 */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- 密码验证界面 --- */
        #auth-panel {
            background-color: #171932;
            border: 1px solid #2a2d5a;
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .auth-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #5c62f7;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .crypto-input {
            width: 100%;
            background-color: #0f1123;
            border: 1px solid #3d4279;
            padding: 14px;
            color: #ffffff;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .crypto-input:focus {
            border-color: #5c62f7;
        }

        .submit-btn {
            width: 100%;
            background-color: #5c62f7;
            color: #ffffff;
            border: none;
            padding: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
        }

        .submit-btn:hover {
            background-color: #4a4fd4;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.9rem;
            margin-top: 12px;
            display: none;
        }

        /* --- 游戏展示主页 --- */
        #game-panel {
            display: none; /* 验证成功前隐藏 */
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2.2rem;
            font-weight: bold;
            color: #8c92ff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }

        /* 单个游戏卡片布局 */
        .game-card {
            background: linear-gradient(135deg, #24164b 0%, #171932 100%);
            border: 1px solid #2a2d5a;
            border-radius: 12px;
            width: 280px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px 20px 20px;
        }

        /* 卡片内图标 */
        .game-icon {
            width: 60px;
            height: 60px;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .game-icon svg {
            width: 100%;
            height: 100%;
            fill: #7399ff;
        }

        .game-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 纯静态无错超链接按钮 */
        .launch-btn {
            display: block;
            width: 100%;
            background-color: #5c62f7;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            padding: 12px 0;
            font-size: 0.95rem;
            font-weight: 500;
            border-radius: 6px;
        }

        .launch-btn:hover {
            background-color: #4a4fd4;
        }
    </style>
</head>
<body>

    <!-- 1. 密码输入界面 -->
    <div id="auth-panel">
        <div class="auth-title">安全锁验证</div>
        <input type="password" id="password-field" class="crypto-input" placeholder="请输入密码" autocomplete="off" autofocus>
        <button type="button" id="submit-btn" class="submit-btn">验证并进入</button>
        <div class="error-msg" id="error-prompt">密码错误，拒绝访问</div>
    </div>

    <!-- 2. 游戏中心主页 -->
    <div id="game-panel">
        <h1 class="page-title">游戏中心</h1>
        
        <div class="game-card">
            <div class="game-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M18.85 4.54l1.41 1.41c.39.39.39 1.02 0 1.41l-1.83 1.83-2.83-2.83 1.83-1.83c.39-.39 1.03-.39 1.42 0M2 22l6.41-6.41c-.08-.34-.04-.71.12-1.05.27-.55.85-.9 1.47-.9h.01l4.01-4.01c-.13-.3-.15-.65-.04-.97.23-.62.83-1.03 1.5-1.02l-4.47-4.47C10.23 2.38 9.1 2 7.94 2c-1.83 0-3.56.71-4.85 2C1.12 6 0 8.71 0 11.58c0 2.22.68 4.3 1.95 6.04L2 22.01M16 11l.03-.03c.67.01 1.27-.4 1.5-1.02.11-.32.09-.67-.04-.97l4.01-4.01c.62.02 1.2-.33 1.47-.88.24-.5.21-1.09-.08-1.57l-3.05 3.05-2.83-2.83 3.05-3.05c-.48-.29-1.07-.32-1.57-.08-.55.27-.9.85-.88 1.47l-4.01 4.01c-.3-.13-.65-.15-.97-.04-.62.23-1.03.83-1.02 1.5L16 11z"/>
                </svg>
            </div>
            <div class="game-name">modern client</div>
            <!-- 绝对正确的目标官方游戏长网址 -->
            <a href="https://345gfdst5jitgj.github.io/modernclient/wasm/" target="_blank" class="launch-btn">立即玩玩</a>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById('password-field');
        const submitButton = document.getElementById('submit-btn');
        const errorPrompt = document.getElementById('error-prompt');
        const authPanel = document.getElementById('auth-panel');
        const gamePanel = document.getElementById('game-panel');

        function checkPassword() {
            // 精准校验 76887
            if (passwordInput.value.trim() === "76887") {
                errorPrompt.style.display = "none";
                authPanel.style.display = "none";
                gamePanel.style.display = "flex";
            } else {
                errorPrompt.style.display = "block";
                passwordInput.value = "";
                passwordInput.focus();
            }
        }

        submitButton.addEventListener('click', function(e) {
            e.preventDefault();
            checkPassword();
        });

        passwordInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                checkPassword();
            }
        });
    </script>
</body>
</html>
